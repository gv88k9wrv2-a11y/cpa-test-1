<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CPA-test-1</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #1e1e2e 0%, #2d1b4e 50%, #0f3460 100%);
        color: #e0e0e0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      .stars {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }

      .star {
        position: absolute;
        width: 2px;
        height: 2px;
        background: white;
        border-radius: 50%;
        animation: twinkle 3s infinite;
      }

      @keyframes twinkle {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 1; }
      }

      .container {
        position: relative;
        z-index: 10;
        text-align: center;
        padding: 2rem;
      }

      h1 {
        font-size: 3.5rem;
        margin-bottom: 1rem;
        background: linear-gradient(45deg, #64b5f6, #81c784, #ffd54f);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: glow 2s ease-in-out infinite;
      }

      .subtitle {
        font-size: 1.2rem;
        color: #a8dadc;
        margin-bottom: 2rem;
        font-style: italic;
      }

      .content {
        background: rgba(30, 30, 46, 0.8);
        border: 1px solid rgba(100, 181, 246, 0.3);
        border-radius: 15px;
        padding: 2.5rem;
        max-width: 500px;
        margin: 0 auto;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(10px);
      }

      .welcome-text {
        font-size: 1.1rem;
        line-height: 1.8;
        margin-bottom: 2rem;
        color: #d0d0d0;
      }

      .buttons {
        display: flex;
        gap: 1rem;
        justify-content: center;
        flex-wrap: wrap;
      }

      button {
        padding: 0.8rem 1.5rem;
        font-size: 1rem;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.3s ease;
        font-weight: 600;
      }

      .btn-primary {
        background: linear-gradient(45deg, #64b5f6, #42a5f5);
        color: white;
      }

      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(66, 165, 245, 0.4);
      }

      .btn-secondary {
        background: rgba(100, 181, 246, 0.2);
        color: #64b5f6;
        border: 1px solid #64b5f6;
      }

      .btn-secondary:hover {
        background: rgba(100, 181, 246, 0.3);
        transform: translateY(-2px);
      }

      @keyframes glow {
        0%, 100% { text-shadow: 0 0 10px rgba(100, 181, 246, 0.5); }
        50% { text-shadow: 0 0 20px rgba(100, 181, 246, 0.8); }
      }

      .footer {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 0.9rem;
        color: rgba(224, 224, 224, 0.6);
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="stars" id="stars"></div>
    
    <div class="container">
      <div class="content">
        <h1>🌙 CPA-test-1</h1>
        <p class="subtitle">ברוכים הבאים לעולם הלילה המעוצב</p>
        
        <div class="welcome-text">
          <p>חוויה שקטה ונעימה עבור כל ערב</p>
          <p style="margin-top: 1rem; font-size: 0.95rem; color: #888;">🌟 אתר זה פועל על GitHub Pages</p>
        </div>

        <div class="buttons">
          <button class="btn-primary" onclick="alert('ברוכים הבאים!')">התחל</button>
          <button class="btn-secondary" onclick="alert('גרסה 1.0')">אודות</button>
        </div>
      </div>
    </div>

    <div class="footer">
      <p>✨ עשוי עם ❤️ | 2026</p>
    </div>

    <script>
      // Create animated stars
      function createStars() {
        const starsContainer = document.getElementById('stars');
        const starCount = 50;
        
        for (let i = 0; i < starCount; i++) {
          const star = document.createElement('div');
          star.className = 'star';
          star.style.left = Math.random() * 100 + '%';
          star.style.top = Math.random() * 100 + '%';
          star.style.animationDelay = Math.random() * 3 + 's';
          starsContainer.appendChild(star);
        }
      }

      // Initialize on page load
      document.addEventListener('DOMContentLoaded', createStars);
    </script>
  </body>
</html>
